<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Authorizing…</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body {
            font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
            margin: 24px
        }

        .card {
            max-width: 520px;
            margin: auto;
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,.06)
        }

        .ok {
            color: #166534
        }

        .err {
            color: #991b1b
        }

        .muted {
            color: #6b7280
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Authorizing…</h3>
        <p id="status" class="muted">Processing the redirect.</p>
    </div>

    <script>
        (async function () {
            const qs = new URLSearchParams(location.search);
            const hs = new URLSearchParams(location.hash.startsWith('#') ? location.hash.slice(1) : "");
            const get = (...keys) => {
                for (const k of keys) {
                    if (qs.has(k)) return qs.get(k);
                    if (hs.has(k)) return hs.get(k);
                }
                return null;
            };

            // อ่านค่า
            const platform = get('platform'); 
            const payload = {
                type: 'mdw-oauth-callback',
                code: get('code', 'auth_code'),
                state: get('state'),
                shopId: get('shop_id', 'shopId', 'sid', 'account_id', 'accountId', 'accountIdStr'),
                error: get('error', 'err'),
                errorDescription: get('error_description', 'message', 'errorDescription')
            };

            // postMessage กลับไปหน้า Portal ที่เปิด popup (origin)
            //const targetOrigin = get('origin') || '*';
            //let posted = false;
            //try { if (window.opener) { window.opener.postMessage(payload, targetOrigin); posted = true; } } catch (e) { }
            //try { if (!posted && window.parent && window.parent !== window) { window.parent.postMessage(payload, targetOrigin); posted = true; } } catch (e) { }

            // UI
            //const el = document.getElementById('status');
            //if (payload.error) { el.textContent = payload.errorDescription || payload.error; el.className = 'err'; }
            //else if (payload.code) { el.textContent = 'Authorization received. You can close this window.'; el.className = 'ok'; }
            //else { el.textContent = 'No code found in the redirect URL.'; el.className = 'err'; }

            // --- Fallback: แลก token ฝั่งเซิร์ฟเวอร์ ---
            try {
                if (payload.code && payload.state && payload.shopId) {
                    await fetch('https://madewe.vibeandchic.com/api/market/auth/exchange-cb', {
                        method: 'POST',
                        mode: 'cors',
                        headers: { 'content-type': 'application/json' },
                        body: JSON.stringify({
                            platform: platform || '',
                            shopId: payload.shopId,
                            code: payload.code,
                            state: payload.state
                        }),
                        credentials: 'omit'  
                    });
                    el.textContent = 'Call Exchange Token Successed..';
                }
            } catch { }

            // ปิดหน้าต่างอัตโนมัติ
            setTimeout(function () { try { window.close(); } catch (e) { } }, 800);
        })();
    </script>
</body>
</html>
